<!DOCTYPE html>

<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PeterSupportHub</title>

<style>

/* Basis reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, Arial, sans-serif;
background:#f4f4f4;
color:#333;
text-align:center;
}

/* ================= */
/* Banner */
/* ================= */

header{
width:100%;
height:220px;
background-image:url("banner.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
justify-content:center;

position:relative;
}

/* overlay */
header::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* titel */
header h1{
position:relative;
color:white;
font-size:2.5rem;
letter-spacing:1px;
text-shadow:0 3px 10px rgba(0,0,0,0.6);
animation:fadeSlide 1s ease forwards;
}

/* ================= */
/* Logo */
/* ================= */

.logo{
margin:30px 0;
}

.logo img{
height:160px;
transition:transform .3s;
}

.logo img:hover{
transform:scale(1.08);
}

/* ================= */
/* Buttons */
/* ================= */

nav{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
padding:20px;
}

.button{

display:inline-block;

padding:16px 25px;

font-size:1.1rem;

color:white;

background:linear-gradient(135deg,#1abc9c,#16a085);

border-radius:10px;

text-decoration:none;

box-shadow:0 6px 15px rgba(0,0,0,0.25);

transition:all .25s ease;

animation:fadeSlide .8s forwards;

opacity:0;
}

/* button animaties */

.button:nth-child(1){animation-delay:.3s}
.button:nth-child(2){animation-delay:.5s}
.button:nth-child(3){animation-delay:.7s}
.button:nth-child(4){animation-delay:.9s}
.button:nth-child(5){animation-delay:1.1s}

/* hover */

.button:hover{

transform:translateY(-5px);

box-shadow:0 12px 22px rgba(0,0,0,0.35);

background:linear-gradient(135deg,#16a085,#1abc9c);

}

/* ================= */
/* Footer */
/* ================= */

footer{

margin-top:40px;

background:#2c3e50;

color:white;

padding:18px;

font-size:.9rem;

opacity:0;

transform:translateY(30px);

transition:all 1s;

}

footer.visible{

opacity:1;

transform:translateY(0);

}

footer p:hover{

text-shadow:0 0 12px #1abc9c;

}

/* ================= */
/* Animatie */
/* ================= */

@keyframes fadeSlide{

0%{

opacity:0;

transform:translateY(25px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

/* ================= */
/* Mobiele layout */
/* ================= */

@media (max-width:768px){

header{
height:180px;
}

header h1{
font-size:1.8rem;
padding:0 15px;
}

.logo img{
height:120px;
}

nav{
flex-direction:column;
align-items:center;
}

.button{
width:85%;
font-size:1rem;
}

}

</style>

</head>

<body>

<header>

<h1>PeterSupportHub</h1>

</header>

<div class="logo">

<img src="logo.jpg" alt="PeterSupportHub logo">

</div>

<nav>

<a class="button" href="https://www.teamviewer.com/nl/solutions/use-cases/quicksupport/" target="_blank">
TeamViewer QuickSupport
</a>

<a class="button" href="https://remotedesktop.google.com/support/" target="_blank">
Chrome Remote Desktop
</a>

<a class="button" href="https://e.pcloud.link/publink/show?code=kZU3JNZ9oWr3FxCbTSHQKHQXGj2JbOFVgYV" target="_blank">
pCloud Downloadzone
</a>

<a class="button" href="https://e.pcloud.link/publink/show?code=kZJ9MAZ3mOqvfUaYYzYM2Kd0ajnmY2uRF0V" target="_blank">
pCloud Software bestanden
</a>

<a class="button" href="mailto:debackerpeter@gmail.com">
E-mail sturen
</a>

</nav>

<footer id="footer">

<p>© 2026 PeterSupportHub – Alle rechten voorbehouden</p>

</footer>

<script>

/* footer animatie */

const footer=document.getElementById("footer");

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
footer.classList.add("visible");
}
});
});

observer.observe(footer);

</script>

</body>

</html>
