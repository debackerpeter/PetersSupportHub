<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeterSupportHub</title>
<style>
/* --- Algemene instellingen --- */
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color:#f4f4f4; color:#333; }
a { text-decoration:none; }

/* --- Banner compact bovenaan met volledig zichtbare afbeelding --- */
header {
    position: relative;
    width: 100%;
    height: 300px;
    background: url('banner.jpg') center/contain no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
}

header::after {
    content: '';
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background-color: rgba(0,0,0,0.2);
}

header h1 {
    position: relative;
    font-size: 2.5rem;
    z-index: 1;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(-30px);
    animation: slideFadeIn 1s forwards 0.3s;
    text-align: center;
}

/* --- Logo onder banner --- */
.logo-container {
    display:flex;
    justify-content:center;
    margin:-40px 0 40px 0;
}

.logo-container img {
    max-height:180px;
    width:auto;
    transition: transform 0.3s ease;
    opacity:0;
    transform:translateY(30px);
    animation: slideFadeIn 1s forwards 0.6s;
}

.logo-container img:hover { transform: scale(1.1); }

/* --- Navigatie met buttons naast elkaar --- */
nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 0 20px 40px 20px;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.button {
    flex: 0 0 auto;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px 25px;
    font-size: 1.2rem;
    color: white;
    background: linear-gradient(135deg,#1abc9c,#16a085);
    border: none;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease, transform 0.2s ease;
    cursor: pointer;
    text-align: center;
    opacity: 0;
    transform:translateY(20px);
    animation: slideFadeIn 0.8s forwards;
}

/* Staggered animatie voor buttons */
.button:nth-child(1){ animation-delay:0.8s; }
.button:nth-child(2){ animation-delay:1.0s; }
.button:nth-child(3){ animation-delay:1.2s; }
.button:nth-child(4){ animation-delay:1.4s; }
.button:nth-child(5){ animation-delay:1.6s; }

.button:hover { 
    background: linear-gradient(135deg,#16a085,#1abc9c);
    transform: translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* --- AI Prompt Generator --- */
.ai-prompt-generator {
    padding: 40px 20px;
    max-width: 800px;
    margin: 20px auto;
    background-color:#fff;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.ai-prompt-generator h2 {
    text-align:center;
    margin-bottom:20px;
    color:#16a085;
}

/* --- Realtime preview styling --- */
#prompt-preview {
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    min-height:200px;
    font-family:monospace;
    font-size:1rem;
    background-color:#f9f9f9;
    white-space: pre-wrap;
}

/* --- Footer --- */
footer {
    background-color:#2c3e50;
    color:white;
    padding:20px;
    text-align:center;
    font-size:0.9rem;
    opacity:0;
    transform:translateY(40px);
    transition: all 1s ease-out;
}

footer.visible { opacity:1; transform:translateY(0); }

footer p {
    transition: all 0.4s ease;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
footer p:hover {
    text-shadow: 0 0 15px #1abc9c, 0 0 20px #16a085;
}

/* --- Animaties --- */
@keyframes slideFadeIn {
    0%{ opacity:0; transform:translateY(30px);}
    100%{ opacity:1; transform:translateY(0);}
}

/* --- Responsiveness --- */
@media(max-width:768px){
    header h1{ font-size:2.2rem; padding:0 20px; }
    .logo-container img{ max-height:140px; }
}

@media(max-width:480px){
    header{ height:250px; }
    .button{ font-size:1rem; padding:15px; }
}
</style>
</head>
<body>

<header id="banner">
    <h1>PeterSupportHub</h1>
</header>

<div class="logo-container">
    <img src="logo.jpg" alt="Site Logo">
</div>

<nav>
    <a class="button" href="https://www.teamviewer.com/nl/solutions/use-cases/quicksupport/" target="_blank">TeamViewer QuickSupport</a>
    <a class="button" href="https://remotedesktop.google.com/support/" target="_blank">Chrome Remote Desktop Support</a>
    <a class="button" href="https://e.pcloud.link/publink/show?code=kZU3JNZ9oWr3FxCbTSHQKHQXGj2JbOFVgYV" target="_blank">pCloud DOWNLOADZONE</a>
    <a class="button" href="https://e.pcloud.link/publink/show?code=kZJ9MAZ3mOqvfUaYYzYM2Kd0ajnmY2uRF0V" target="_blank">pCloud Software bestanden</a>
    <a class="button" href="mailto:debackerpeter@gmail.com">E-mail to Gmail</a>
</nav>

<!-- --- Premium AI Prompt Generator met Realtime Preview --- -->
<div class="ai-prompt-generator">
    <h2>AI Prompt Generator (Premium)</h2>
    
    <div style="display:flex; flex-direction:column; gap:15px;">
        <label for="ai-model">Kies AI model:</label>
        <select id="ai-model" style="padding:10px; font-size:1rem; border-radius:8px; border:1px solid #ccc;">
            <option value="chatgpt">ChatGPT</option>
            <option value="dalle">DALL·E</option>
            <option value="other">Ander model</option>
        </select>

        <label for="content-type">Type content:</label>
        <select id="content-type" style="padding:10px; font-size:1rem; border-radius:8px; border:1px solid #ccc;">
            <option value="blog">Blog</option>
            <option value="artwork">Artwork</option>
            <option value="socialmedia">Social media</option>
        </select>

        <label for="topic">Onderwerp of ideeën (één per regel):</label>
        <textarea id="topic" placeholder="Typ je ideeën, één per regel..." style="padding:10px; font-size:1rem; border-radius:8px; border:1px solid #ccc; min-height:120px;"></textarea>

        <button id="generate-prompt" style="padding:15px; font-size:1.1rem; background:linear-gradient(135deg,#1abc9c,#16a085); color:white; border:none; border-radius:12px; cursor:pointer; transition:0.3s;">Genereer Prompts</button>

        <label>Realtime Preview:</label>
        <div id="prompt-preview"></div>

        <textarea id="prompt-output" readonly placeholder="Je AI prompts verschijnen hier..." style="padding:15px; border-radius:12px; border:1px solid #ccc; min-height:200px; font-family:monospace; font-size:1rem;"></textarea>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="copy-prompt" style="padding:10px; font-size:1rem; background:#16a085; color:white; border:none; border-radius:8px; cursor:pointer;">Kopieer alle Prompts</button>
            <button id="export-csv" style="padding:10px; font-size:1rem; background:#1abc9c; color:white; border:none; border-radius:8px; cursor:pointer;">Export naar CSV</button>
            <button id="export-txt" style="padding:10px; font-size:1rem; background:#2ecc71; color:white; border:none; border-radius:8px; cursor:pointer;">Export naar TXT</button>
        </div>
    </div>
</div>

<footer id="site-footer">
    <p>© 2026 PeterSupportHub. Alle rechten voorbehouden.</p>
</footer>

<script>
// Parallax effect banner
const banner = document.getElementById('banner');
window.addEventListener('scroll', () => {
    let offset = window.scrollY;
    banner.style.backgroundPositionY = offset * 0.5 + 'px';
});

// Footer fade-in bij scroll
const footer = document.getElementById('site-footer');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            footer.classList.add('visible');
            observer.unobserve(footer);
        }
    });
}, { threshold: 0.2 });
observer.observe(footer);

// --- AI Prompt Generator ---
function generatePrompt(type, topic, model) {
    let basePrompt = "";
    switch(type){
        case "blog": basePrompt = `Schrijf een uitgebreide, professionele blog over "${topic}".`; break;
        case "artwork": basePrompt = `Creëer een gedetailleerde digitale artwork gebaseerd op het thema "${topic}".`; break;
        case "socialmedia": basePrompt = `Maak een creatieve social media post over "${topic}". Kort, boeiend en met call-to-action.`; break;
        default: basePrompt = `Maak een AI prompt voor "${topic}".`;
    }
    if(model === "chatgpt") basePrompt += " Gebruik een duidelijke structuur en voorbeeldzinnen.";
    if(model === "dalle") basePrompt += " Zorg voor visuele details, kleurenpalet en stijl.";
    return basePrompt;
}

const topicInput = document.getElementById('topic');
const previewDiv = document.getElementById('prompt-preview');
const outputArea = document.getElementById('prompt-output');

function updatePrompts() {
    const type = document.getElementById('content-type').value;
    const model = document.getElementById('ai-model').value;
    const topics = topicInput.value.split("\n").filter(t => t.trim() !== "");
    if(topics.length === 0){
        previewDiv.textContent = "";
        outputArea.value = "";
        return;
    }
    const prompts = topics.map(t => generatePrompt(type, t, model));
    previewDiv.textContent = prompts.join("\n\n---\n\n");
    outputArea.value = previewDiv.textContent;
}

topicInput.addEventListener('input', updatePrompts);
document.getElementById('content-type').addEventListener('change', updatePrompts);
document.getElementById('ai-model').addEventListener('change', updatePrompts);
document.getElementById('generate-prompt').addEventListener('click', updatePrompts);

document.getElementById('copy-prompt').addEventListener('click', () => {
    outputArea.select();
    navigator.clipboard.writeText(outputArea.value);
    alert('Prompts gekopieerd naar klembord!');
});

document.getElementById('export-csv').addEventListener('click', () => {
    const output = outputArea.value;
    if(!output) return alert("Geen prompts om te exporteren!");
    const lines = output.split("\n\n---\n\n").map(line => `"${line.replace(/"/g, '""')}"`);
    const csvContent = "data:text/csv;charset=utf-8," + lines.join("\n");
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "ai_prompts.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});

document.getElementById('export-txt').addEventListener('click', () => {
    const output = outputArea.value;
    if(!output) return alert("Geen prompts om te exporteren!");
    const blob = new Blob([output], {type:"text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "ai_prompts.txt";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});
</script>

</body>
</html>
